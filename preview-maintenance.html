<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>doug_plean_tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #09090b;
      color: #f4f4f5;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      overflow: hidden;
    }

    /* Subtle radial glow behind the card */
    body::before {
      content: '';
      position: fixed;
      top: 38%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(16,185,129,0.04) 0%, transparent 70%);
      pointer-events: none;
    }

    .page {
      width: 100%;
      max-width: 420px;
      padding: 0 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* Header */
    header {
      width: 100%;
      padding: 40px 0 0;
    }

    header h1 {
      font-size: 17px;
      font-weight: 600;
      color: #a1a1aa;
      letter-spacing: -0.01em;
    }

    /* Center content — vertically centered in remaining space */
    .center {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding-bottom: 80px;
      width: 100%;
    }

    /* Spinner ring */
    .spinner-wrap {
      position: relative;
      width: 64px;
      height: 64px;
      margin-bottom: 32px;
    }

    .spinner-ring {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      border: 2px solid #1a1a1f;
      border-top-color: #10b981;
      animation: spin 1.1s cubic-bezier(0.4, 0, 0.2, 1) infinite;
    }

    /* Faint inner dot */
    .spinner-dot {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 6px;
      height: 6px;
      background: #10b981;
      border-radius: 50%;
      opacity: 0.35;
      animation: pulse-dot 2s ease-in-out infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @keyframes pulse-dot {
      0%, 100% { opacity: 0.2; transform: translate(-50%, -50%) scale(1); }
      50%      { opacity: 0.5; transform: translate(-50%, -50%) scale(1.4); }
    }

    /* Status text */
    .status {
      font-size: 13px;
      font-weight: 400;
      color: #52525b;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 40px;
    }

    /* Progress area */
    .progress {
      width: 100%;
    }

    .progress-track {
      width: 100%;
      height: 3px;
      background: #18181b;
      border-radius: 2px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      background: #10b981;
      border-radius: 2px;
      transition: width 1s linear;
      box-shadow: 0 0 8px rgba(16, 185, 129, 0.25);
    }

    .progress-meta {
      display: flex;
      justify-content: flex-end;
      align-items: baseline;
      margin-top: 12px;
    }

    .progress-pct {
      font-size: 12px;
      font-weight: 500;
      color: #52525b;
      font-variant-numeric: tabular-nums;
    }

    /* Mobile */
    @media (max-width: 480px) {
      .page { padding: 0 20px; }
      header { padding-top: 32px; }
      header h1 { font-size: 15px; }
      .spinner-wrap { width: 52px; height: 52px; margin-bottom: 28px; }
      .status { font-size: 12px; margin-bottom: 36px; }
      .center { padding-bottom: 60px; }
    }
  </style>
</head>
<body>
  <div class="page">
    <header>
      <h1>doug_plean_tracker</h1>
    </header>

    <div class="center">
      <div class="spinner-wrap">
        <div class="spinner-ring"></div>
        <div class="spinner-dot"></div>
      </div>

      <p class="status">updating</p>

      <div class="progress">
        <div class="progress-track">
          <div class="progress-fill" id="fill"></div>
        </div>
        <div class="progress-meta">
          <span class="progress-pct" id="pct">23%</span>
        </div>
      </div>
    </div>
  </div>

  <script>
    const START_PCT = 23;
    const DURATION_MS = 44 * 60 * 1000; // 44 minutes to go from 23% to 100%
    const start = Date.now();

    (function tick() {
      const elapsed = Date.now() - start;
      const p = Math.min(START_PCT + ((100 - START_PCT) * elapsed / DURATION_MS), 100);
      document.getElementById('fill').style.width = p + '%';
      document.getElementById('pct').textContent = Math.floor(p) + '%';
      if (p < 100) requestAnimationFrame(tick);
    })();
  </script>
</body>
</html>
